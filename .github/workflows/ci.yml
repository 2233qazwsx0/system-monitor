name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: ShellCheck (setup.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck setup.sh || true

  python-check:
    name: Python Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: |
          python3 -c "import fastapi; print(fastapi.__version__)"
          python3 -c "import uvicorn; print(uvicorn.__version__)"
          python3 -c "import psutil; print(psutil.__version__)"
          python3 -c "import websockets; print(websockets.__version__)"

  dry-run:
    name: setup.sh --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: DRY_RUN=1 bash setup.sh --dry-run --port 9090 --port-probe 8080 9099

  docker-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: docker-compose config
